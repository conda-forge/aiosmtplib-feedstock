schema_version: 1

context:
  name: aiosmtplib
  version: "5.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 2504a23b2b63c9de6bc4ea719559a38996dba68f73f6af4eb97be20ee4c5e6c4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - aiosmtplib
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: MIT
  license_file: LICENSE.txt
  summary: Asynchronous SMTP client for use with asyncio.
  homepage: https://github.com/cole/aiosmtplib
  repository: https://github.com/cole/aiosmtplib
  documentation: https://aiosmtplib.readthedocs.io/

extra:
  recipe-maintainers:
    - thewchan
